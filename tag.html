<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3 Player Tag Game</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
  }

  canvas {
    background: #222;
    display: block;
    margin: 10px auto;
    border: 2px solid #0f0;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-bottom: 10px;
    font-size: 14px;
  }

  .player {
    background: #333;
    padding: 10px 15px;
    border-radius: 8px;
  }

  .blue { border: 2px solid blue; }
  .red { border: 2px solid red; }
  .green { border: 2px solid green; }
</style>
</head>

<body>

<h2>3 Player Tag Game</h2>
<p id="status"></p>

<div class="controls">
  <div class="player blue">
    <b>Blue Player</b><br>
    Move: W A S D
  </div>

  <div class="player red">
    <b>Red Player</b><br>
    Move: Arrow Keys
  </div>

  <div class="player green">
    <b>Green Player</b><br>
    Move: I J K L
  </div>
</div>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const players = [
  { x: 100, y: 100, color: "blue", keys: {}, speed: 3 },
  { x: 700, y: 100, color: "red", keys: {}, speed: 3 },
  { x: 400, y: 400, color: "green", keys: {}, speed: 3 }
];

let itIndex = 0;

function drawPlayer(p) {
  ctx.fillStyle = p.color;
  ctx.fillRect(p.x, p.y, 20, 20);
}

function update() {
  players.forEach((p, i) => {
    if (p.keys["left"]) p.x -= p.speed;
    if (p.keys["right"]) p.x += p.speed;
    if (p.keys["up"]) p.y -= p.speed;
    if (p.keys["down"]) p.y += p.speed;

    // boundaries
    p.x = Math.max(0, Math.min(canvas.width - 20, p.x));
    p.y = Math.max(0, Math.min(canvas.height - 20, p.y));
  });

  // tagging logic
  const it = players[itIndex];
  players.forEach((p, i) => {
    if (i !== itIndex) {
      if (
        Math.abs(p.x - it.x) < 20 &&
        Math.abs(p.y - it.y) < 20
      ) {
        itIndex = i;
      }
    }
  });

  document.getElementById("status").innerText =
    "Player " + (itIndex + 1) + " is IT";
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  players.forEach(drawPlayer);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Key handling
document.addEventListener("keydown", e => {
  // Player 1 (WASD)
  if (e.key === "w") players[0].keys.up = true;
  if (e.key === "s") players[0].keys.down = true;
  if (e.key === "a") players[0].keys.left = true;
  if (e.key === "d") players[0].keys.right = true;

  // Player 2 (Arrow keys)
  if (e.key === "ArrowUp") players[1].keys.up = true;
  if (e.key === "ArrowDown") players[1].keys.down = true;
  if (e.key === "ArrowLeft") players[1].keys.left = true;
  if (e.key === "ArrowRight") players[1].keys.right = true;

  // Player 3 (IJKL)
  if (e.key === "i") players[2].keys.up = true;
  if (e.key === "k") players[2].keys.down = true;
  if (e.key === "j") players[2].keys.left = true;
  if (e.key === "l") players[2].keys.right = true;
});

document.addEventListener("keyup", e => {
  // Player 1
  if (e.key === "w") players[0].keys.up = false;
  if (e.key === "s") players[0].keys.down = false;
  if (e.key === "a") players[0].keys.left = false;
  if (e.key === "d") players[0].keys.right = false;

  // Player 2
  if (e.key === "ArrowUp") players[1].keys.up = false;
  if (e.key === "ArrowDown") players[1].keys.down = false;
  if (e.key === "ArrowLeft") players[1].keys.left = false;
  if (e.key === "ArrowRight") players[1].keys.right = false;

  // Player 3
  if (e.key === "i") players[2].keys.up = false;
  if (e.key === "k") players[2].keys.down = false;
  if (e.key === "j") players[2].keys.left = false;
  if (e.key === "l") players[2].keys.right = false;
});

gameLoop();
</script>

</body>
</html>
