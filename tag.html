<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3 Player Tag</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  h2 {
    margin: 10px 0;
  }

  #ui {
    margin-bottom: 10px;
  }

  #game {
    position: relative;
    width: 1100px;
    height: 700px;
    margin: auto;
    background: linear-gradient(#3aa0ff, #8fd3ff);
    overflow: hidden;
    border: 3px solid #0f0;
  }

  .player {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 4px;
  }

  #p1 { background: red; }
  #p2 { background: blue; }
  #p3 { background: green; }

  .platform {
    position: absolute;
    background: #5a8f3b;
    border-radius: 4px;
  }

  .trampoline {
    position: absolute;
    width: 40px;
    height: 120px;
    background: orange;
  }

  .tag-label {
    position: absolute;
    font-size: 10px;
    font-weight: bold;
    transform: translateY(-18px);
  }
</style>
</head>

<body>

<h2>3 Player Tag</h2>

<div id="ui">
  Map Style Arena | Time: <span id="timer">90</span>s
</div>

<div id="game">
  <div id="p1" class="player"></div>
  <div id="p2" class="player"></div>
  <div id="p3" class="player"></div>

  <div id="label1" class="tag-label"></div>
  <div id="label2" class="tag-label"></div>
  <div id="label3" class="tag-label"></div>

  <!-- Edge trampolines -->
  <div id="leftTramp" class="trampoline" style="left:0; top:250px;"></div>
  <div id="rightTramp" class="trampoline" style="left:1060px; top:250px;"></div>

  <!-- Platforms -->
  <div class="platform" style="width:300px;height:12px;left:100px;top:550px;"></div>
  <div class="platform" style="width:250px;height:12px;left:450px;top:480px;"></div>
  <div class="platform" style="width:200px;height:12px;left:750px;top:420px;"></div>

  <div class="platform" style="width:180px;height:12px;left:200px;top:380px;"></div>
  <div class="platform" style="width:180px;height:12px;left:600px;top:320px;"></div>

  <div class="platform" style="width:150px;height:12px;left:100px;top:250px;"></div>
  <div class="platform" style="width:150px;height:12px;left:800px;top:200px;"></div>

  <div class="platform" style="width:220px;height:12px;left:400px;top:150px;"></div>

</div>

<script>
let players = {
  p1: {x:150,y:600,vx:0,vy:0},
  p2: {x:400,y:600,vx:0,vy:0},
  p3: {x:700,y:600,vx:0,vy:0}
};

let gravity = 0.6;
let jumpPower = -14;
let keys = {};
let tagger = "p1";

document.addEventListener("keydown", e => {
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
    e.preventDefault();
  }
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

// ---------------- MOVEMENT ----------------

function movePlayer(id, left, right, jump) {
  let p = players[id];

  if (keys[left]) p.vx = -4;
  else if (keys[right]) p.vx = 4;
  else p.vx *= 0.85;

  if (keys[jump] && p.y >= 600) {
    p.vy = jumpPower;
  }
}

function applyPhysics(p) {
  p.vy += gravity;
  p.x += p.vx;
  p.y += p.vy;

  if (p.y > 600) {
    p.y = 600;
    p.vy = 0;
  }

  if (p.x < 0) p.x = 0;
  if (p.x > 1080) p.x = 1080;
}

// ---------------- TAG SYSTEM ----------------

function checkTag() {
  let ids = Object.keys(players);

  ids.forEach(a => {
    ids.forEach(b => {
      if (a !== b && a === tagger) {
        let pa = players[a];
        let pb = players[b];

        if (Math.abs(pa.x - pb.x) < 25 && Math.abs(pa.y - pb.y) < 25) {
          tagger = b;
        }
      }
    });
  });
}

// ---------------- TRAMPOLINES ----------------

function checkTrampoline(p) {
  let left = document.getElementById("leftTramp").getBoundingClientRect();
  let right = document.getElementById("rightTramp").getBoundingClientRect();
  let rect = document.getElementById("game").getBoundingClientRect();

  let px = p.x + rect.left;
  let py = p.y + rect.top;

  if (px > left.left && px < left.right && py > left.top && py < left.bottom) {
    p.vy = -16;
    p.vx = 7;
  }

  if (px > right.left && px < right.right && py > right.top && py < right.bottom) {
    p.vy = -16;
    p.vx = -7;
  }
}

// ---------------- LABELS ----------------

function updateLabels() {
  ["p1","p2","p3"].forEach(id => {
    let label = document.getElementById("label" + id.slice(1));
    label.innerText = (tagger === id) ? "IT" : "";

    label.style.left = players[id].x + "px";
    label.style.top = players[id].y + "px";
  });
}

// ---------------- GAME LOOP ----------------

function update() {
  movePlayer("p1","a","d","w");
  movePlayer("p2","arrowleft","arrowright","arrowup");
  movePlayer("p3","j","l","i");

  Object.values(players).forEach(p => {
    applyPhysics(p);
    checkTrampoline(p);
  });

  checkTag();
  updateLabels();

  document.getElementById("p1").style.left = players.p1.x + "px";
  document.getElementById("p1").style.top = players.p1.y + "px";

  document.getElementById("p2").style.left = players.p2.x + "px";
  document.getElementById("p2").style.top = players.p2.y + "px";

  document.getElementById("p3").style.left = players.p3.x + "px";
  document.getElementById("p3").style.top = players.p3.y + "px";

  requestAnimationFrame(update);
}

update();

// ---------------- TIMER ----------------

let time = 90;

setInterval(() => {
  time--;
  document.getElementById("timer").textContent = time;

  if (time <= 0) {
    alert("Game Over! Last tagged (IT) loses: " + tagger.toUpperCase());
    location.reload();
  }
}, 1000);
</script>

</body>
</html>
