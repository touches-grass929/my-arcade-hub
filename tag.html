<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3 Player Tag</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

#game {
  position: relative;
  width: 750px;
  height: 400px;
  margin: auto;
  background: linear-gradient(#3aa0ff, #8fd3ff);
  border: 3px solid #0f0;
  overflow: hidden;
}

.player {
  position: absolute;
  width: 25px;
  height: 25px;
}

#p1 { background: red; }
#p2 { background: blue; }
#p3 { background: green; }

.platform {
  position: absolute;
  background: #4caf50;
}

.trampoline {
  position: absolute;
  width: 60px;
  height: 20px;
  background: orange;
  bottom: 0;
}

.label {
  position: absolute;
  font-size: 12px;
  font-weight: bold;
  transform: translateY(-18px);
}
</style>
</head>

<body>

<h2>3 Player Tag</h2>
Time: <span id="timer">90</span>s

<div id="game">

  <div id="p1" class="player"></div>
  <div id="p2" class="player"></div>
  <div id="p3" class="player"></div>

  <div id="l1" class="label"></div>
  <div id="l2" class="label"></div>
  <div id="l3" class="label"></div>

  <!-- Trampolines -->
  <div class="trampoline" style="left:0;"></div>
  <div class="trampoline" style="right:0;"></div>

  <!-- Platforms -->
  <div class="platform" style="left:60px;top:300px;width:150px;height:10px;"></div>
  <div class="platform" style="left:280px;top:240px;width:150px;height:10px;"></div>
  <div class="platform" style="left:500px;top:180px;width:150px;height:10px;"></div>

</div>

<script>
const game = document.getElementById("game");
const platforms = document.querySelectorAll(".platform");

let players = {
  p1: {x:60,y:340,vx:0,vy:0,onGround:false},
  p2: {x:250,y:340,vx:0,vy:0,onGround:false},
  p3: {x:450,y:340,vx:0,vy:0,onGround:false}
};

let gravity = 0.7;
let jump = -13;
let keys = {};
let tagger = "p1";

// 🔒 prevents instant re-tag spam
let tagCooldown = 0;

// prevent scrolling
document.addEventListener("keydown", e => {
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
    e.preventDefault();
  }
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

// movement
function move(id, l, r, j) {
  let p = players[id];

  if (keys[l]) p.vx = -4;
  else if (keys[r]) p.vx = 4;
  else p.vx *= 0.8;

  if (keys[j] && p.onGround) {
    p.vy = jump;
    p.onGround = false;
  }
}

// platform collision
function collide(p) {
  p.onGround = false;

  platforms.forEach(pl => {
    let r = pl.getBoundingClientRect();
    let g = game.getBoundingClientRect();

    let px = p.x + g.left;
    let py = p.y + g.top;

    let onTop =
      px + 25 > r.left &&
      px < r.right &&
      py + 25 >= r.top &&
      py + 25 <= r.top + 10 &&
      p.vy >= 0;

    if (onTop) {
      p.y = r.top - g.top - 25;
      p.vy = 0;
      p.onGround = true;
    }
  });

  // ground
  if (p.y > 375) {
    p.y = 375;
    p.vy = 0;
    p.onGround = true;
  }
}

// trampolines
function trampoline(p) {
  if (p.y >= 375) {
    if (p.x < 60) {
      p.vy = -16;
      p.vx = 6;
    }
    if (p.x > 690) {
      p.vy = -16;
      p.vx = -6;
    }
  }
}

// ✅ FIXED TAG SYSTEM (no green bug)
function tagCheck() {
  if (tagCooldown > 0) {
    tagCooldown--;
    return;
  }

  let it = players[tagger];

  for (let id in players) {
    if (id === tagger) continue;

    let p = players[id];

    let touching =
      Math.abs(it.x - p.x) < 30 &&
      Math.abs(it.y - p.y) < 30;

    if (touching) {
      tagger = id;
      tagCooldown = 20; // small delay

      document.body.style.background = "#400";
      setTimeout(() => document.body.style.background = "#111", 100);

      break; // 🔥 prevents multiple tags in one frame
    }
  }
}

// labels
function labels() {
  ["p1","p2","p3"].forEach((id,i) => {
    let l = document.getElementById("l"+(i+1));
    l.innerText = (tagger === id) ? "IT" : "";
    l.style.left = players[id].x + "px";
    l.style.top = players[id].y + "px";
  });
}

// game loop
function update() {
  move("p1","a","d","w");
  move("p2","arrowleft","arrowright","arrowup");
  move("p3","j","l","i");

  Object.values(players).forEach(p => {
    p.vy += gravity;
    p.x += p.vx;
    p.y += p.vy;

    collide(p);
    trampoline(p);

    if (p.x < 0) p.x = 0;
    if (p.x > 725) p.x = 725;
  });

  tagCheck();
  labels();

  document.getElementById("p1").style.left = players.p1.x+"px";
  document.getElementById("p1").style.top = players.p1.y+"px";

  document.getElementById("p2").style.left = players.p2.x+"px";
  document.getElementById("p2").style.top = players.p2.y+"px";

  document.getElementById("p3").style.left = players.p3.x+"px";
  document.getElementById("p3").style.top = players.p3.y+"px";

  requestAnimationFrame(update);
}

update();

// timer
let t = 90;
setInterval(()=>{
  t--;
  document.getElementById("timer").textContent = t;

  if (t <= 0) {
    alert("Game Over! Last tagged loses: " + tagger.toUpperCase());
    location.reload();
  }
}, 1000);
</script>

</body>
</html>
