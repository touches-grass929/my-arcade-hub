<!DOCTYPE html>
<html>
<body style="background:black;">
<canvas id="p" width="600" height="400"></canvas>
<script>
let ctx=p.getContext("2d");
let ball={x:300,y:200,dx:4,dy:4};
let paddle={y:150};

document.addEventListener("mousemove",e=>{
paddle.y=e.clientY-50;
});

setInterval(()=>{
ctx.clearRect(0,0,600,400);

ctx.fillRect(10,paddle.y,10,100);

ctx.beginPath();
ctx.arc(ball.x,ball.y,10,0,6.28);
ctx.fill();

ball.x+=ball.dx;
ball.y+=ball.dy;

if(ball.y<0||ball.y>400) ball.dy*=-1;

if(ball.x<20 && ball.y>paddle.y && ball.y<paddle.y+100){
ball.dx*=-1;
}
},16);
</script>
</body>
</html>
