<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird Clone</title>
<style>
  body {
    margin: 0;
    background: #70c5ce;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }
  canvas {
    background: #70c5ce;
    border: 2px solid #333;
  }
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Bird
let bird = {
  x: 80,
  y: 200,
  width: 20,
  height: 20,
  velocity: 0
};

let gravity = 0.5;
let jump = -8;

// Pipes
let pipes = [];
let pipeWidth = 60;
let gap = 120;

// Game state
let score = 0;
let gameOver = false;

// Controls
document.addEventListener("keydown", () => {
  if (!gameOver) {
    bird.velocity = jump;
  } else {
    resetGame();
  }
});

document.addEventListener("click", () => {
  if (!gameOver) {
    bird.velocity = jump;
  } else {
    resetGame();
  }
});

// Create pipes
function createPipe() {
  let topHeight = Math.random() * 250 + 50;

  pipes.push({
    x: canvas.width,
    top: topHeight,
    bottom: topHeight + gap
  });
}

// Reset
function resetGame() {
  bird.y = 200;
  bird.velocity = 0;
  pipes = [];
  score = 0;
  gameOver = false;
}

// Update
function update() {
  if (gameOver) return;

  // Bird physics
  bird.velocity += gravity;
  bird.y += bird.velocity;

  // Pipes movement
  pipes.forEach(pipe => {
    pipe.x -= 3;

    // Score
    if (pipe.x + pipeWidth === bird.x) {
      score++;
    }

    // Collision
    if (
      bird.x < pipe.x + pipeWidth &&
      bird.x + bird.width > pipe.x &&
      (bird.y < pipe.top || bird.y + bird.height > pipe.bottom)
    ) {
      gameOver = true;
    }
  });

  // Remove off-screen pipes
  pipes = pipes.filter(p => p.x + pipeWidth > 0);

  // Ground / ceiling collision
  if (bird.y + bird.height > canvas.height || bird.y < 0) {
    gameOver = true;
  }
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Bird
  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x, bird.y, bird.width, bird.height);

  // Pipes
  ctx.fillStyle = "green";
  pipes.forEach(pipe => {
    // Top pipe
    ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
    // Bottom pipe
    ctx.fillRect(pipe.x, pipe.bottom, pipeWidth, canvas.height);
  });

  // Score
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);

  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 90, 250);
    ctx.font = "16px Arial";
    ctx.fillText("Click or Press Key to Restart", 70, 300);
  }
}

// Loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Spawn pipes
setInterval(() => {
  if (!gameOver) createPipe();
}, 1500);

gameLoop();
</script>

</body>
</html>
