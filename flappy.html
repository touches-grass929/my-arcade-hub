<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<style>
  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #70c5ce;
    font-family: Arial;
  }
  canvas {
    background: #70c5ce;
    border: 2px solid #333;
  }
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Bird
let bird = { x: 80, y: 200, vy: 0 };
const gravity = 0.5;
const jump = -8;

// Pipes
let pipes = [];
const pipeWidth = 60;
const gap = 120;

// Score
let score = 0;
let highScore = localStorage.getItem("flappyHighScore") || 0;
let gameOver = false;

// Controls
document.addEventListener("keydown", () => {
  if (!gameOver) bird.vy = jump;
  else resetGame();
});

document.addEventListener("click", () => {
  if (!gameOver) bird.vy = jump;
  else resetGame();
});

// Create pipe
function createPipe() {
  let top = Math.random() * 250 + 50;
  pipes.push({
    x: canvas.width,
    top: top,
    bottom: top + gap,
    passed: false
  });
}

// Reset
function resetGame() {
  bird.y = 200;
  bird.vy = 0;
  pipes = [];
  score = 0;
  gameOver = false;
}

// Update
function update() {
  if (gameOver) return;

  // Bird physics
  bird.vy += gravity;
  bird.y += bird.vy;

  // Pipes
  pipes.forEach(pipe => {
    pipe.x -= 3;

    // Score when passing pipe
    if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
      score++;
      pipe.passed = true;
    }

    // Collision
    if (
      bird.x < pipe.x + pipeWidth &&
      bird.x + 20 > pipe.x &&
      (bird.y < pipe.top || bird.y + 20 > pipe.bottom)
    ) {
      endGame();
    }
  });

  pipes = pipes.filter(p => p.x + pipeWidth > 0);

  // Ground / ceiling
  if (bird.y > canvas.height || bird.y < 0) {
    endGame();
  }
}

// Game over
function endGame() {
  gameOver = true;

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("flappyHighScore", highScore);
  }
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Bird
  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x, bird.y, 20, 20);

  // Pipes
  ctx.fillStyle = "green";
  pipes.forEach(pipe => {
    ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipeWidth, canvas.height);
  });

  // Scoreboard
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);
  ctx.fillText("High Score: " + highScore, 10, 60);

  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 100, 300);
    ctx.font = "16px Arial";
    ctx.fillText("Click or Press Key to Restart", 80, 340);
  }
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Spawn pipes
setInterval(() => {
  if (!gameOver) createPipe();
}, 1500);

loop();
</script>

</body>
</html>
