<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snake Game</title>
  <style>
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    canvas {
      background: #111;
      display: block;
      margin: auto;
      border: 2px solid #0f0;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const scale = 20;
    const rows = canvas.height / scale;
    const cols = canvas.width / scale;

    let snake = [];
    snake[0] = { x: 9 * scale, y: 9 * scale };

    let direction = null;

    let food = {
      x: Math.floor(Math.random() * cols) * scale,
      y: Math.floor(Math.random() * rows) * scale,
    };

    let score = 0;

    function drawSnake() {
      ctx.fillStyle = '#00FF00';
      for (let segment of snake) {
        ctx.fillRect(segment.x, segment.y, scale, scale);
      }
    }

    function drawFood() {
      ctx.fillStyle = '#FF0000';
      ctx.fillRect(food.x, food.y, scale, scale);
    }

    function update() {
      if (!direction) return;

      let head = { ...snake[0] };

      switch (direction) {
        case 'LEFT': head.x -= scale; break;
        case 'RIGHT': head.x += scale; break;
        case 'UP': head.y -= scale; break;
        case 'DOWN': head.y += scale; break;
      }

      if (head.x < 0) head.x = canvas.width - scale;
      else if (head.x >= canvas.width) head.x = 0;
      if (head.y < 0) head.y = canvas.height - scale;
      else if (head.y >= canvas.height) head.y = 0;

      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          alert('Game Over! Your score: ' + score);
          snake = [{ x: 9 * scale, y: 9 * scale }];
          direction = null;
          score = 0;
          food = {
            x: Math.floor(Math.random() * cols) * scale,
            y: Math.floor(Math.random() * rows) * scale,
          };
          return;
        }
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        food = {
          x: Math.floor(Math.random() * cols) * scale,
          y: Math.floor(Math.random() * rows) * scale,
        };
      } else {
        snake.pop();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawSnake();
      drawFood();
      ctx.fillStyle = '#fff';
      ctx.font = '20px Arial';
      ctx.fillText('Score: ' + score, 10, 25);
    }

    window.addEventListener('keydown', e => {
      const key = e.key;
      if (key === 'ArrowLeft' && direction !== 'RIGHT') direction = 'LEFT';
      else if (key === 'ArrowRight' && direction !== 'LEFT') direction = 'RIGHT';
      else if (key === 'ArrowUp' && direction !== 'DOWN') direction = 'UP';
      else if (key === 'ArrowDown' && direction !== 'UP') direction = 'DOWN';
    });

    function gameLoop() {
      update();
      draw();
    }

    setInterval(gameLoop, 100);
  </script>
</body>
</html>
