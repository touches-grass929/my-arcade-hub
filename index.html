<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Arcade Hub</title>

  <style>
    body {
      background:#222;
      color:#eee;
      font-family:Arial,sans-serif;
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    header {
      background:#111;
      width:100%;
      padding:15px;
      text-align:center;
      font-size:24px;
      font-weight:bold;
      border-bottom:2px solid #0f0;
    }

    main {
      margin-top:20px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:20px;
      width:90%;
      max-width:900px;
    }

    /* 🔐 Password section */
    #passwordDiv {
      text-align:center;
    }

    input {
      padding:10px;
      font-size:16px;
      border-radius:5px;
      border:none;
      margin-right:10px;
    }

    button {
      background:#0f0;
      border:none;
      padding:10px 15px;
      font-size:16px;
      font-weight:bold;
      border-radius:6px;
      cursor:pointer;
    }

    button:hover {
      background:#0c0;
    }

    /* 🎮 Grid layout */
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:20px;
      width:100%;
    }

    .card {
      background:#333;
      border-radius:10px;
      padding:15px;
      text-align:center;
      transition:transform 0.2s, background 0.2s;
    }

    .card:hover {
      transform:scale(1.05);
      background:#444;
    }

    .card h3 {
      margin-bottom:10px;
    }

    .play-btn {
      width:100%;
    }

    iframe {
      margin-top:20px;
      border:2px solid #0f0;
      width:100%;
      max-width:800px;
      height:500px;
      background:#000;
      border-radius:10px;
    }

    #games {
      display:none;
      flex-direction:column;
      align-items:center;
      width:100%;
    }

    .controls {
      margin-top:10px;
    }

  </style>
</head>

<body>

<header>My Arcade Hub 🎮</header>

<main>

  <!-- 🔐 Password Screen -->
  <div id="passwordDiv">
    <p>Enter password to access the arcade:</p>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Enter</button>
    <p id="errorMsg" style="color:red; display:none;">Wrong password!</p>
  </div>

  <!-- 🎮 Games Section -->
  <div id="games">

    <div class="grid">

      <div class="card">
        <h3>Snake</h3>
        <button class="play-btn" onclick="loadGame('snake.html')">Play</button>
      </div>

      <div class="card">
        <h3>Pong</h3>
        <button class="play-btn" onclick="loadGame('pong.html')">Play</button>
      </div>

      <div class="card">
        <h3>Tic Tac Toe</h3>
        <button class="play-btn" onclick="loadGame('tictactoe.html')">Play</button>
      </div>

      <div class="card">
        <h3>Geometry Dash</h3>
        <button class="play-btn" onclick="loadGame('geometrydash.html')">Play</button>
      </div>

    </div>

    <!-- Controls -->
    <div class="controls">
      <button onclick="goHome()">Back to Menu</button>
    </div>

    <iframe id="gameFrame" src=""></iframe>

  </div>

</main>

<script>
  const correctPassword = "1234"; // change this if you want

  function checkPassword() {
    const inputField = document.getElementById("passwordInput");
    const input = inputField.value;

    if (input === correctPassword) {
      document.getElementById("passwordDiv").style.display = "none";
      document.getElementById("games").style.display = "flex";
    } else {
      document.getElementById("errorMsg").style.display = "block";
      inputField.value = "";
    }
  }

  function loadGame(game) {
    const frame = document.getElementById("gameFrame");
    frame.src = game;

    // smooth scroll to game
    frame.scrollIntoView({ behavior: "smooth" });
  }

  function goHome() {
    document.getElementById("gameFrame").src = "";
  }
</script>

</body>
</html>
