<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Arcade Hub</title>
  <style>
    body {
      background: #222;
      color: #eee;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      background: #111;
      width: 100%;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      border-bottom: 2px solid #0f0;
    }
    main {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 90%;
      max-width: 700px;
    }
    button {
      background: #0f0;
      border: none;
      padding: 12px 20px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
      width: 200px;
    }
    button:hover {
      background: #0c0;
    }
    iframe {
      margin-top: 20px;
      border: 2px solid #0f0;
      width: 600px;
      height: 420px;
      background: #000;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>My Arcade Hub 🎮</header>
  <main>
    <button onclick="loadGame('snake.html')">Play Snake</button>
    <button onclick="loadGame('pong.html')">Play Pong</button>
    <iframe id="gameFrame" src="" title="Game Frame"></iframe>
  </main>

  <script>
    function loadGame(game) {
      const iframe = document.getElementById('gameFrame');
      iframe.src = game;
    }
  </script>
</body>
</html>
