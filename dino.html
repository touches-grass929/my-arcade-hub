<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dino Runner</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: Arial;
  background: #f7f7f7;
}

#game {
  position: relative;
  width: 750px;
  height: 200px;
  margin: 40px auto;
  overflow: hidden;
  border: 2px solid black;
  background: #fff;
  transition: background 0.5s;
}

/* Dino */
#dino {
  position: absolute;
  width: 44px;
  height: 44px;
  bottom: 0;
  left: 50px;
  background: url("https://i.imgur.com/6X12Z6B.png") no-repeat center/contain;
}

.duck {
  height: 25px !important;
}

/* Obstacles */
.obstacle {
  position: absolute;
  width: 25px;
  height: 50px;
  bottom: 0;
  background: url("https://i.imgur.com/t6Y6ZlT.png") no-repeat center/contain;
}

.bird {
  position: absolute;
  width: 40px;
  height: 25px;
  background: url("https://i.imgur.com/9Qx9Q9T.png") no-repeat center/contain;
}

/* UI */
#ui {
  margin-top: 10px;
  font-size: 18px;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Dino Runner 🦖</h2>

<div id="ui">
  Score: <span id="score">0</span> |
  High Score: <span id="high">0</span>
</div>

<div id="game">
  <div id="dino"></div>
</div>

<button onclick="restartGame()" id="restartBtn" style="display:none;">Restart</button>

<script>
const dino = document.getElementById("dino");
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const highEl = document.getElementById("high");
const restartBtn = document.getElementById("restartBtn");

let velocityY = 0;
let gravity = 1;
let jumping = false;
let ducking = false;

let obstacles = [];
let speed = 6;
let score = 0;
let gameOver = false;

// load high score
let highScore = localStorage.getItem("dinoHigh") || 0;
highEl.textContent = highScore;

// controls
document.addEventListener("keydown", e => {
  if (gameOver) return;

  if (e.code === "Space" && !jumping) {
    velocityY = -15;
    jumping = true;
  }

  if (e.code === "ArrowDown") {
    ducking = true;
    dino.classList.add("duck");
  }
});

document.addEventListener("keyup", e => {
  if (e.code === "ArrowDown") {
    ducking = false;
    dino.classList.remove("duck");
  }
});

// spawn obstacles
function spawnObstacle() {
  if (gameOver) return;

  let type = Math.random();
  let obs = document.createElement("div");

  if (type < 0.7) {
    obs.classList.add("obstacle");
    obs.style.bottom = "0px";
  } else {
    obs.classList.add("bird");
    obs.style.top = (80 + Math.random()*40) + "px";
  }

  obs.style.left = "750px";
  game.appendChild(obs);
  obstacles.push(obs);

  setTimeout(spawnObstacle, 900 + Math.random() * 900);
}

spawnObstacle();

// collision
function isColliding(a, b) {
  let ar = a.getBoundingClientRect();
  let br = b.getBoundingClientRect();

  return !(
    ar.top > br.bottom ||
    ar.bottom < br.top ||
    ar.right < br.left ||
    ar.left > br.right
  );
}

// game loop
function update() {
  if (gameOver) return;

  // gravity
  velocityY += gravity;
  let bottom = parseInt(window.getComputedStyle(dino).bottom);
  bottom -= velocityY;

  if (bottom <= 0) {
    bottom = 0;
    jumping = false;
  }

  dino.style.bottom = bottom + "px";

  // move obstacles
  obstacles.forEach((obs, i) => {
    let left = parseInt(obs.style.left);
    left -= speed;
    obs.style.left = left + "px";

    if (isColliding(dino, obs)) {
      endGame();
    }

    if (left < -60) {
      obs.remove();
      obstacles.splice(i, 1);
    }
  });

  // difficulty
  speed += 0.002;

  // score
  score++;
  scoreEl.textContent = score;

  // 🌗 day/night cycle
  if (Math.floor(score / 500) % 2 === 1) {
    game.style.background = "#222";
  } else {
    game.style.background = "#fff";
  }

  requestAnimationFrame(update);
}

update();

function endGame() {
  gameOver = true;

  // save high score
  if (score > highScore) {
    localStorage.setItem("dinoHigh", score);
    highEl.textContent = score;
  }

  restartBtn.style.display = "inline-block";
}

function restartGame() {
  // reset everything
  obstacles.forEach(o => o.remove());
  obstacles = [];

  score = 0;
  speed = 6;
  velocityY = 0;
  gameOver = false;

  dino.style.bottom = "0px";

  restartBtn.style.display = "none";

  spawnObstacle();
  update();
}
</script>

</body>
</html>
