<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Dino Game</title>
<style>
  body {
    margin: 0;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }
  canvas {
    background: #fff;
    border: 2px solid #333;
  }
</style>
</head>
<body>

<canvas id="game" width="750" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Sounds
const jumpSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const hitSound = new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");

// Dino
let dino = {
  x: 50,
  y: 300,
  width: 40,
  height: 40,
  vy: 0,
  jumping: false,
  ducking: false
};

let gravity = 0.6;
let obstacles = [];
let birds = [];
let score = 0;
let highScore = localStorage.getItem("dinoHighScore") || 0;
let gameOver = false;
let speed = 5;

// Controls
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    if (!dino.jumping) {
      dino.vy = -12;
      dino.jumping = true;
      jumpSound.play();
    }
    if (gameOver) resetGame();
  }

  if (e.code === "ArrowDown") {
    dino.ducking = true;
  }
});

document.addEventListener("keyup", (e) => {
  if (e.code === "ArrowDown") {
    dino.ducking = false;
  }
});

// Obstacles
function createObstacle() {
  const type = Math.random() > 0.5 ? "cactus" : "bird";

  if (type === "cactus") {
    obstacles.push({
      x: canvas.width,
      y: 320,
      width: 20,
      height: 40
    });
  } else {
    birds.push({
      x: canvas.width,
      y: 250 + Math.random() * 50,
      width: 30,
      height: 20
    });
  }
}

// Reset
function resetGame() {
  obstacles = [];
  birds = [];
  score = 0;
  speed = 5;
  gameOver = false;
  dino.y = 300;
  dino.vy = 0;
}

// Update
function update() {
  if (gameOver) return;

  // Dino physics
  dino.vy += gravity;
  dino.y += dino.vy;

  if (dino.y >= 300) {
    dino.y = 300;
    dino.jumping = false;
  }

  // Speed increases over time
  speed += 0.001;

  // Obstacles
  obstacles.forEach(obs => {
    obs.x -= speed;

    if (collision(dino, obs)) {
      endGame();
    }
  });

  birds.forEach(b => {
    b.x -= speed;

    if (collision(dino, b)) {
      endGame();
    }
  });

  obstacles = obstacles.filter(o => o.x + o.width > 0);
  birds = birds.filter(b => b.x + b.width > 0);

  score++;
}

// Collision
function collision(a, b) {
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

// Game over
function endGame() {
  hitSound.play();
  gameOver = true;

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("dinoHighScore", highScore);
  }
}

// Draw pixel dino
function drawDino() {
  ctx.fillStyle = "green";

  let height = dino.ducking ? 25 : dino.height;
  let width = dino.ducking ? 50 : dino.width;

  ctx.fillRect(dino.x, dino.y, width, height);
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground
  ctx.fillStyle = "#333";
  ctx.fillRect(0, 360, canvas.width, 2);

  // Dino
  drawDino();

  // Cactus
  ctx.fillStyle = "black";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, o.width, o.height);
  });

  // Birds
  ctx.fillStyle = "gray";
  birds.forEach(b => {
    ctx.fillRect(b.x, b.y, b.width, b.height);
  });

  // Score
  ctx.fillStyle = "black";
  ctx.font = "16px Arial";
  ctx.fillText("Score: " + score, 10, 20);
  ctx.fillText("High Score: " + highScore, 10, 40);

  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 250, 180);
    ctx.font = "16px Arial";
    ctx.fillText("Press SPACE to restart", 240, 210);
  }
}

// Loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Spawn obstacles
setInterval(() => {
  if (!gameOver) createObstacle();
}, 1200);

gameLoop();
</script>

</body>
</html>
