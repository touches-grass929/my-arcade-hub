<!DOCTYPE html>
<html>
<body style="background:black; color:white; text-align:center; font-family:Arial;">

<h1>❌⭕ Tic Tac Toe</h1>

<div id="board"></div>
<p id="status"></p>

<script>
let board = ["","","","","","","","",""];
let currentPlayer = "X";

function drawBoard(){
  let html = "";
  for(let i=0;i<9;i++){
    html += `<button onclick="makeMove(${i})" style="width:80px;height:80px;font-size:30px;margin:2px;">${board[i]}</button>`;
    if((i+1)%3===0) html += "<br>";
  }
  document.getElementById("board").innerHTML = html;
}

function makeMove(i){
  if(board[i] === ""){
    board[i] = currentPlayer;
    currentPlayer = currentPlayer === "X" ? "O" : "X";
    checkWinner();
    drawBoard();
  }
}

function checkWinner(){
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for(let combo of wins){
    let [a,b,c] = combo;
    if(board[a] && board[a] === board[b] && board[a] === board[c]){
      document.getElementById("status").innerText = board[a] + " wins!";
      board = ["","","","","","","","",""];
      return;
    }
  }
}

drawBoard();
</script>

</body>
</html>
